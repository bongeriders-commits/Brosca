<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1a3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bogonko ROSCA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bogonko ROSCA</title>
<style>
  :root{
    --gold-light:#f5c85a;
    --gold:#e8ab2f;
    --navy-deep:#0a1a3c;
    --navy-light:#16386f;
    --navy:#0e2a5e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 55%, var(--navy-light) 100%);
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:pointer;
  }
  .splash{
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeIn .6s ease-out;
  }
  .logo-ring{
    width:96px;
    height:96px;
    border-radius:50%;
    background:var(--gold);
    border:3px solid var(--gold-light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    font-weight:800;
    color:var(--navy-deep);
    box-shadow:0 8px 28px rgba(0,0,0,.35);
    animation:pop .5s ease-out, pulse 1.4s ease-in-out infinite .5s;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes pop{
    0%{transform:scale(.6); opacity:0;}
    100%{transform:scale(1); opacity:1;}
  }
  @keyframes pulse{
    0%,100%{transform:scale(1); box-shadow:0 8px 28px rgba(0,0,0,.35);}
    50%{transform:scale(1.08); box-shadow:0 10px 34px rgba(232,171,47,.4);}
  }
</style>
</head>
<body onclick="goToLogin()">
  <div class="splash">
    <div class="logo-ring">B</div>
  </div>

  <script>
    // Offline support removed — actively unregister any old cached
    // service worker instead of installing a new one.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
    function goToLogin(){
      window.location.href = 'login.html';
    }
    setTimeout(goToLogin, 1200);
  </script>
</body>
</html>
