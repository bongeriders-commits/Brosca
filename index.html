<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1a3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bogonko ROSCA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bogonko ROSCA</title>
<style>
  :root{
    --cream:#f4f5f7;
    --gold-light:#f5c85a;
    --gold:#e8ab2f;
    --ink:#0a1a3c;
    --muted:#7c8aa8;
    --navy-deep:#0a1a3c;
    --navy-light:#16386f;
    --navy:#0e2a5e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 55%, var(--navy-light) 100%);
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:pointer;
  }
  .splash{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    animation:fadeIn .6s ease-out;
  }
  .logo-ring{
    width:96px;
    height:96px;
    border-radius:50%;
    background:var(--gold);
    border:3px solid var(--gold-light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    font-weight:800;
    color:var(--navy-deep);
    box-shadow:0 8px 28px rgba(0,0,0,.35);
    animation:pop .5s ease-out;
  }
  h1{
    margin:0;
    color:#fff;
    font-size:26px;
    font-weight:800;
    letter-spacing:.5px;
    text-align:center;
  }
  h1 span{ color:var(--gold); }
  .tagline{
    margin:0;
    color:rgba(255,255,255,.65);
    font-size:13px;
    letter-spacing:.3px;
    text-align:center;
  }
  .spinner{
    width:28px;
    height:28px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.2);
    border-top-color:var(--gold);
    animation:spin .8s linear infinite;
    margin-top:6px;
  }
  .skip{
    position:absolute;
    bottom:28px;
    color:rgba(255,255,255,.55);
    font-size:12px;
    letter-spacing:.3px;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes pop{
    0%{transform:scale(.6); opacity:0;}
    100%{transform:scale(1); opacity:1;}
  }
  @keyframes spin{
    to{transform:rotate(360deg);}
  }
</style>
</head>
<body onclick="goToLogin()">
  <div class="splash">
    <div class="logo-ring">B</div>
    <div>
      <h1>BOGONKO <span>ROSCA</span></h1>
      <p class="tagline">Bogonko-Ngelani Stage</p>
    </div>
    <div class="spinner"></div>
  </div>
  <div class="skip">Tap to continue</div>

  <script>
    function goToLogin(){
      window.location.href = 'login.html';
    }
    // Auto-advance to login after a short splash delay
    setTimeout(goToLogin, 1600);
  </script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
